<svg viewBox="0 0 680 520" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Stackchan system architecture</title>
<desc>Layered architecture showing the phone app, server, robot firmware, and xiaozhi platform</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<g fill="#2c2c2a" font-family="-apple-system,BlinkMacSystemFont,sans-serif">
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="500">Stackchan system architecture</text>
<rect x="40" y="50" width="280" height="130" rx="12" fill="#e6f1fb" stroke="#378add" stroke-width="0.5"/>
<text x="56" y="74" font-size="13" font-weight="500">Phone app (flutter)</text>
<text x="56" y="92" font-size="11" fill="#5f5e5a">login, bind device, control robot</text>
<rect x="56" y="104" width="110" height="28" rx="6" fill="#b5d4f4" stroke="#378add" stroke-width="0.5"/><text x="111" y="122" text-anchor="middle" font-size="11">user api (rest)</text>
<rect x="176" y="104" width="120" height="28" rx="6" fill="#b5d4f4" stroke="#378add" stroke-width="0.5"/><text x="236" y="122" text-anchor="middle" font-size="11">websocket (audio/data)</text>
<rect x="56" y="140" width="110" height="28" rx="6" fill="#b5d4f4" stroke="#378add" stroke-width="0.5"/><text x="111" y="158" text-anchor="middle" font-size="11">ble handshake</text>
<rect x="176" y="140" width="120" height="28" rx="6" fill="#b5d4f4" stroke="#378add" stroke-width="0.5"/><text x="236" y="158" text-anchor="middle" font-size="11">xiaozhi sdk</text>
<rect x="360" y="50" width="280" height="130" rx="12" fill="#eaf3de" stroke="#639922" stroke-width="0.5"/>
<text x="376" y="74" font-size="13" font-weight="500">Robot firmware (esp-idf)</text>
<text x="376" y="92" font-size="11" fill="#5f5e5a">stack-chan on esp32-s3</text>
<rect x="376" y="104" width="110" height="28" rx="6" fill="#c0dd97" stroke="#639922" stroke-width="0.5"/><text x="431" y="122" text-anchor="middle" font-size="11">websocket client</text>
<rect x="496" y="104" width="120" height="28" rx="6" fill="#c0dd97" stroke="#639922" stroke-width="0.5"/><text x="556" y="122" text-anchor="middle" font-size="11">ble server (nimble)</text>
<rect x="376" y="140" width="110" height="28" rx="6" fill="#c0dd97" stroke="#639922" stroke-width="0.5"/><text x="431" y="158" text-anchor="middle" font-size="11">audio capture/play</text>
<rect x="496" y="140" width="120" height="28" rx="6" fill="#c0dd97" stroke="#639922" stroke-width="0.5"/><text x="556" y="158" text-anchor="middle" font-size="11">motor/emotion control</text>
<rect x="40" y="220" width="600" height="130" rx="12" fill="#fbeaf0" stroke="#d4537e" stroke-width="0.5"/>
<text x="56" y="244" font-size="13" font-weight="500">Server (go, port 12800)</text>
<text x="56" y="262" font-size="11" fill="#5f5e5a">running on aliyun cloud, stackchan server</text>
<rect x="56" y="276" width="130" height="28" rx="6" fill="#f4c0d1" stroke="#d4537e" stroke-width="0.5"/><text x="121" y="294" text-anchor="middle" font-size="11">user auth (jwt)</text>
<rect x="196" y="276" width="130" height="28" rx="6" fill="#f4c0d1" stroke="#d4537e" stroke-width="0.5"/><text x="261" y="294" text-anchor="middle" font-size="11">device management</text>
<rect x="336" y="276" width="130" height="28" rx="6" fill="#f4c0d1" stroke="#d4537e" stroke-width="0.5"/><text x="401" y="294" text-anchor="middle" font-size="11">dance/pano/posts</text>
<rect x="476" y="276" width="140" height="28" rx="6" fill="#f4c0d1" stroke="#d4537e" stroke-width="0.5"/><text x="546" y="294" text-anchor="middle" font-size="11">admin panel (web)</text>
<rect x="56" y="312" width="130" height="28" rx="6" fill="#f4c0d1" stroke="#d4537e" stroke-width="0.5"/><text x="121" y="330" text-anchor="middle" font-size="11">websocket hub</text>
<rect x="196" y="312" width="130" height="28" rx="6" fill="#f4c0d1" stroke="#d4537e" stroke-width="0.5"/><text x="261" y="330" text-anchor="middle" font-size="11">xiaozhi token proxy</text>
<rect x="336" y="312" width="130" height="28" rx="6" fill="#f4c0d1" stroke="#d4537e" stroke-width="0.5"/><text x="401" y="330" text-anchor="middle" font-size="11">file upload/serve</text>
<rect x="476" y="312" width="140" height="28" rx="6" fill="#f4c0d1" stroke="#d4537e" stroke-width="0.5"/><text x="546" y="330" text-anchor="middle" font-size="11">app store</text>
<rect x="40" y="390" width="280" height="110" rx="12" fill="#faede7" stroke="#d85a30" stroke-width="0.5"/>
<text x="56" y="414" font-size="13" font-weight="500">Storage</text>
<rect x="56" y="426" width="120" height="28" rx="6" fill="#f5c4b3" stroke="#d85a30" stroke-width="0.5"/><text x="116" y="444" text-anchor="middle" font-size="11">mysql</text>
<rect x="186" y="426" width="120" height="28" rx="6" fill="#f5c4b3" stroke="#d85a30" stroke-width="0.5"/><text x="246" y="444" text-anchor="middle" font-size="11">file system</text>
<rect x="56" y="462" width="246" height="28" rx="6" fill="#f5c4b3" stroke="#d85a30" stroke-width="0.5"/><text x="179" y="480" text-anchor="middle" font-size="11">nvs flash (firmware config)</text>
<rect x="360" y="390" width="280" height="110" rx="12" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text x="376" y="414" font-size="13" font-weight="500">External</text>
<rect x="376" y="426" width="248" height="28" rx="6" fill="#fac775" stroke="#ba7517" stroke-width="0.5"/><text x="500" y="444" text-anchor="middle" font-size="11">xiaozhi.me (ai/llm/tts)</text>
<rect x="376" y="462" width="120" height="28" rx="6" fill="#fac775" stroke="#ba7517" stroke-width="0.5"/><text x="436" y="480" text-anchor="middle" font-size="11">m5stack forum</text>
<rect x="506" y="462" width="118" height="28" rx="6" fill="#fac775" stroke="#ba7517" stroke-width="0.5"/><text x="565" y="480" text-anchor="middle" font-size="11">mqtt broker</text>
<line x1="111" y1="180" x2="121" y2="274" stroke="#378add" stroke-width="1" stroke-dasharray="4,3"/><text x="105" y="230" font-size="10" fill="#378add">http</text>
<line x1="111" y1="140" x2="556" y2="104" stroke="#639922" stroke-width="1" stroke-dasharray="4,3"/><text x="320" y="115" font-size="10" fill="#639922">ble (handshake &amp; config)</text>
<line x1="236" y1="180" x2="121" y2="310" stroke="#378add" stroke-width="1" stroke-dasharray="4,3"/><text x="160" y="248" font-size="10" fill="#378add">websocket</text>
<line x1="431" y1="180" x2="261" y2="310" stroke="#639922" stroke-width="1" stroke-dasharray="4,3"/><text x="340" y="248" font-size="10" fill="#639922">websocket (audio/control)</text>
<line x1="261" y1="350" x2="500" y2="424" stroke="#ba7517" stroke-width="1" stroke-dasharray="4,3"/><text x="360" y="390" font-size="10" fill="#ba7517">http (token proxy)</text>
<line x1="236" y1="140" x2="500" y2="424" stroke="#378add" stroke-width="1" stroke-dasharray="4,3"/><text x="380" y="280" font-size="10" fill="#378add">http (license/devices)</text>
<line x1="121" y1="350" x2="116" y2="424" stroke="#d4537e" stroke-width="1"/><line x1="261" y1="350" x2="246" y2="424" stroke="#d4537e" stroke-width="1"/>
</g>
</svg>